services:
  app:
    build:
      context: .
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "127.0.0.1:${APP_PORT:-3101}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en el archivo .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Define ADMIN_EMAIL en el archivo .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Define ADMIN_PASSWORD en el archivo .env}
    volumes:
      - grupos-data:/app/data
    restart: unless-stopped

volumes:
  grupos-data:
